<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dopamine Lock</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161618;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #5e5ce6;
            --danger: #ff453a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .view { display: none; height: 100%; flex-direction: column; padding: 2rem; }
        .view.active { display: flex; }

        h1 { font-size: 2rem; margin: 0; }
        .subtitle { color: var(--text-dim); margin-bottom: 2rem; }

        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 20px; margin-bottom: 1rem; }
        
        .btn { 
            background: var(--accent); color: white; border: none; padding: 1rem; 
            border-radius: 12px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: #27272a; }

        /* Dashboard */
        .streak { font-size: 3rem; font-weight: 700; }
    </style>
</head>
<body>
    <!-- Needs to be completed with full logic ->
    <div id="dashboard" class="view active">
        <h1>Dopamine Lock</h1>
        <p class="subtitle">Control your impulses. Rebuild discipline.</p>
        <div class="card">
            <div>Streak</div>
            <div class="streak">7 Days</div>
        </div>
        <button class="btn" onclick="showView('setup')">Start Lock Session</button>
        <button class="btn btn-secondary" onclick="showView('progress')" style="margin-top:0.5rem">View Progress</button>
    </div>

    <!-- ... rest of screens ... -->

    <script>
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
