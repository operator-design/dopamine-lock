<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dopamine Lock</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #161618;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --accent: #5e5ce6;
            --accent-glow: rgba(94, 92, 230, 0.4);
            --danger: #ff453a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .view { display: none; height: 100%; flex-direction: column; padding: 2rem; }
        .view.active { display: flex; }

        h1 { font-size: 1.5rem; margin: 0; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; }

        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 20px; margin-bottom: 1rem; border: 1px solid #27272a; }
        
        .btn { 
            background: var(--accent); color: white; border: none; padding: 1.25rem; 
            border-radius: 16px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
            width: 100%; box-shadow: 0 4px 12px var(--accent-glow);
        }
        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: #27272a; color: var(--text-main); box-shadow: none; }
        
        .streak-val { font-size: 3.5rem; font-weight: 700; margin: 0.5rem 0; }
        
        /* Session Setup */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
        .goal-btn { background: #27272a; border-radius: 12px; padding: 1rem; text-align: center; cursor: pointer; border: 1px solid #27272a; }
        .goal-btn.active { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <div id="dashboard" class="view active">
        <h1>Dopamine Lock</h1>
        <p class="subtitle">Control your impulses. Rebuild discipline.</p>
        <div class="card">
            <div>Current Streak</div>
            <div class="streak-val">7</div>
            <div style="color: var(--text-dim);">Days committed</div>
        </div>
        <div class="card">
            <div>Today's Locked Time</div>
            <div style="font-size: 2rem; font-weight: 600; margin: 0.5rem 0;">4h 12m</div>
        </div>
        <button class="btn" onclick="showView('setup')">Start Lock Session</button>
        <button class="btn btn-secondary" onclick="showView('progress')" style="margin-top:0.5rem">View Progress</button>
    </div>

    <div id="setup" class="view">
        <h1>New Session</h1>
        <p class="subtitle">Select your focus area.</p>
        <div class="grid">
            <div class="goal-btn">Social</div><div class="goal-btn">Deep Work</div>
            <div class="goal-btn">Workout</div><div class="goal-btn">Study</div>
        </div>
        <button class="btn" onclick="showView('lock')">Start Session</button>
        <button class="btn btn-secondary" onclick="showView('dashboard')" style="margin-top:0.5rem">Back</button>
    </div>

    <div id="lock" class="view" style="align-items:center; justify-content:center;">
        <div style="font-size: 5rem; font-weight: 700; font-variant-numeric: tabular-nums;">59:42</div>
        <div style="color: var(--text-dim); margin-bottom: 3rem;">Deep Work Session</div>
        <button class="btn btn-secondary" style="width:auto; padding: 1rem 2rem;">Hold to Cancel</button>
    </div>

    <div id="progress" class="view">
        <h1>Activity</h1>
        <div class="card">
            <div>Total Locked</div>
            <div style="font-size: 2rem; font-weight: 700;">48.5 hours</div>
        </div>
        <button class="btn btn-secondary" onclick="showView('dashboard')">Back</button>
    </div>

    <script>
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
